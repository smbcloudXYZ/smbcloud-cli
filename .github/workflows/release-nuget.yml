name: NuGet CLI Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.3.38)"
        required: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CLI_CLIENT_SECRET: ${{ secrets.CLI_CLIENT_SECRET }}
  DOTNET_VERSION: 8.0.x
  NUGET_PACKAGE_ID: SmbCloud.Cli

jobs:
  build-native-binaries:
    name: Build native binary (${{ matrix.build.NAME }})
    runs-on: ${{ matrix.build.OS }}
    strategy:
      fail-fast: false
      matrix:
        build:
          - {
              NAME: linux-x64,
              OS: ubuntu-latest,
              TARGET: x86_64-unknown-linux-gnu,
            }
          - {
              NAME: linux-arm64,
              OS: ubuntu-24.04-arm,
              TARGET: aarch64-unknown-linux-gnu,
            }
          - {
              NAME: windows-x64,
              OS: windows-2022,
              TARGET: x86_64-pc-windows-msvc,
            }
          - {
              NAME: windows-arm64,
              OS: windows-2022,
              TARGET: aarch64-pc-windows-msvc,
            }
          - {
              NAME: darwin-x64,
              OS: macos-15-intel,
              TARGET: x86_64-apple-darwin,
            }
          - {
              NAME: darwin-arm64,
              OS: macos-latest,
              TARGET: aarch64-apple-darwin,
            }
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set the release version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            release_version="${GITHUB_REF_NAME#v}"
          else
            release_version="${{ github.event.inputs.tag }}"
            release_version="${release_version#v}"
          fi

          echo "RELEASE_VERSION=${release_version}" >> "$GITHUB_ENV"

      - name: Read Rust toolchain
        shell: bash
        run: |
          rust_toolchain="$(sed -n 's/^channel = "\(.*\)"/\1/p' rust-toolchain.toml | head -n 1)"
          if [ -z "$rust_toolchain" ]; then
            echo "Failed to read Rust toolchain from rust-toolchain.toml" >&2
            exit 1
          fi

          echo "RUST_TOOLCHAIN=${rust_toolchain}" >> "$GITHUB_ENV"

      - name: Install toolkit
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.build.TARGET }}

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: nuget-${{ matrix.build.TARGET }}

      - name: Build
        env:
          GH_OAUTH_CLIENT_ID: ${{ secrets.GH_OAUTH_CLIENT_ID }}
          GH_OAUTH_CLIENT_SECRET: ${{ secrets.GH_OAUTH_CLIENT_SECRET }}
          GH_OAUTH_REDIRECT_URI: ${{ secrets.GH_OAUTH_REDIRECT_URI }}
        shell: bash
        run: cargo build --release --locked --target ${{ matrix.build.TARGET }} --package smbcloud-cli

      - name: Prepare artifact
        shell: bash
        run: |
          executable_name="smb"
          if [[ "${{ matrix.build.OS }}" == "windows-2022" ]]; then
            executable_name="smb.exe"
          fi

          mkdir -p "nuget-artifacts/native/${{ matrix.build.NAME }}"
          cp "target/${{ matrix.build.TARGET }}/release/${executable_name}" "nuget-artifacts/native/${{ matrix.build.NAME }}/${executable_name}"

      - name: Upload native artifact
        uses: actions/upload-artifact@v7
        with:
          name: nuget-native-${{ matrix.build.NAME }}
          path: nuget-artifacts/native

  pack-nuget:
    name: Pack NuGet .NET tool
    runs-on: ubuntu-latest
    needs: build-native-binaries
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set the release version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            release_version="${GITHUB_REF_NAME#v}"
          else
            release_version="${{ github.event.inputs.tag }}"
            release_version="${release_version#v}"
          fi

          echo "RELEASE_VERSION=${release_version}" >> "$GITHUB_ENV"

      - name: Download native artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: nuget-native-*
          path: nuget/smbcloud-cli
          merge-multiple: true

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Pack .NET tool
        shell: bash
        run: |
          dotnet pack nuget/smbcloud-cli/SmbCloud.Cli.csproj \
            --configuration Release \
            --output nuget/dist \
            -p:PackageVersion=${RELEASE_VERSION}

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: nuget-package
          path: nuget/dist/*.nupkg

  smoke-test:
    name: Smoke test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: pack-nuget
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-2022
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set the release version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            release_version="${GITHUB_REF_NAME#v}"
          else
            release_version="${{ github.event.inputs.tag }}"
            release_version="${release_version#v}"
          fi

          echo "RELEASE_VERSION=${release_version}" >> "$GITHUB_ENV"

      - name: Download package artifact
        uses: actions/download-artifact@v7
        with:
          name: nuget-package
          path: nuget/dist

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install tool from local package
        shell: pwsh
        run: |
          $packageSource = (Resolve-Path "nuget/dist").Path
          @"
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="local" value="$packageSource" />
            </packageSources>
          </configuration>
          "@ | Set-Content -Path "nuget/NuGet.Config"

          dotnet tool install `
            --tool-path ".tool" `
            --configfile "nuget/NuGet.Config" `
            --version "$env:RELEASE_VERSION" `
            "$env:NUGET_PACKAGE_ID"

      - name: Run smb --version
        shell: pwsh
        run: |
          $toolPath = if ($IsWindows) { ".\.tool\smb.exe" } else { "./.tool/smb" }
          & $toolPath --version

  publish-nuget:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    needs: smoke-test
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set the release version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            release_version="${GITHUB_REF_NAME#v}"
          else
            release_version="${{ github.event.inputs.tag }}"
            release_version="${release_version#v}"
          fi

          echo "RELEASE_VERSION=${release_version}" >> "$GITHUB_ENV"

      - name: Download package artifact
        uses: actions/download-artifact@v7
        with:
          name: nuget-package
          path: nuget/dist

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Check whether release already exists on NuGet
        id: nuget-check
        shell: bash
        run: |
          package_index_url="https://api.nuget.org/v3-flatcontainer/smbcloud.cli/index.json"
          if curl -fsS "${package_index_url}" | grep -F "\"${RELEASE_VERSION}\"" >/dev/null; then
            echo "${NUGET_PACKAGE_ID} ${RELEASE_VERSION} already exists on NuGet, skipping publish"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish package
        if: steps.nuget-check.outputs.exists != 'true'
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        shell: bash
        run: |
          dotnet nuget push nuget/dist/*.nupkg \
            --api-key "${NUGET_API_KEY}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
