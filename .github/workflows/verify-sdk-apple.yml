name: Apple Bridge SDK Verification

# Verifies the internal Apple bridge crate used for local UniFFI/XCFramework
# development. This workflow does not publish or update the standalone
# smbcloud-auth-swift repository.
#
# It builds the Rust Apple bridge for supported Apple targets, generates the
# UniFFI Swift bindings, assembles a local XCFramework, and uploads the
# generated artifacts for inspection.

# Temporarily disabled (2026-06-17): the automatic push/pull_request triggers
# are commented out so this no longer runs as a PR/push check. It stays
# available on demand via "Run workflow" (workflow_dispatch). To re-enable,
# uncomment the push and pull_request blocks below.
on:
  # push:
  #   paths:
  #     - ".github/workflows/verify-sdk-apple.yml"
  #     - "Cargo.toml"
  #     - "Cargo.lock"
  #     - "rust-toolchain.toml"
  #     - "crates/smbcloud-auth-sdk-apple/**"
  #     - "crates/smbcloud-auth-sdk/**"
  #     - "crates/smbcloud-model/**"
  #     - "crates/smbcloud-network/**"
  # pull_request:
  #   paths:
  #     - ".github/workflows/verify-sdk-apple.yml"
  #     - "Cargo.toml"
  #     - "Cargo.lock"
  #     - "rust-toolchain.toml"
  #     - "crates/smbcloud-auth-sdk-apple/**"
  #     - "crates/smbcloud-auth-sdk/**"
  #     - "crates/smbcloud-model/**"
  #     - "crates/smbcloud-network/**"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  XCFRAMEWORK_NAME: smbcloud_authFFI.xcframework
  STATIC_LIB_NAME: libsmbcloud_auth.a

jobs:
  verify-sdk-apple:
    name: Verify smbcloud-auth-sdk-apple
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read Rust toolchain
        shell: bash
        run: |
          rust_toolchain="$(sed -n 's/^channel = "\(.*\)"/\1/p' rust-toolchain.toml | head -n 1)"
          if [ -z "${rust_toolchain}" ]; then
            echo "Failed to read Rust toolchain from rust-toolchain.toml" >&2
            exit 1
          fi

          echo "RUST_TOOLCHAIN=${rust_toolchain}" >> "$GITHUB_ENV"

      - name: Install stable Rust with Apple targets
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,aarch64-apple-darwin

      - name: Install nightly Rust with Apple targets
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: nightly
          components: rust-src
          targets: aarch64-apple-tvos,aarch64-apple-tvos-sim,aarch64-apple-visionos,aarch64-apple-visionos-sim

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: verify-sdk-apple

      - name: Build UniFFI bindgen helper
        shell: bash
        run: |
          cargo +"${RUST_TOOLCHAIN}" build \
            --manifest-path crates/smbcloud-auth-sdk-apple/Cargo.toml \
            --features bindgen \
            --bin uniffi-bindgen \
            --release

      - name: Build Apple bridge static libraries
        shell: bash
        run: |
          set -euo pipefail

          IPHONEOS_DEPLOYMENT_TARGET=16.0 cargo +"${RUST_TOOLCHAIN}" rustc \
            --manifest-path Cargo.toml \
            --package smbcloud-auth-sdk-apple \
            --target aarch64-apple-ios \
            --release \
            --lib \
            --crate-type staticlib

          IPHONEOS_DEPLOYMENT_TARGET=16.0 cargo +"${RUST_TOOLCHAIN}" rustc \
            --manifest-path Cargo.toml \
            --package smbcloud-auth-sdk-apple \
            --target aarch64-apple-ios-sim \
            --release \
            --lib \
            --crate-type staticlib

          MACOSX_DEPLOYMENT_TARGET=14.0 cargo +"${RUST_TOOLCHAIN}" rustc \
            --manifest-path Cargo.toml \
            --package smbcloud-auth-sdk-apple \
            --target aarch64-apple-darwin \
            --release \
            --lib \
            --crate-type staticlib

          TVOS_DEPLOYMENT_TARGET=16.0 cargo +nightly rustc -Z build-std \
            --manifest-path Cargo.toml \
            --package smbcloud-auth-sdk-apple \
            --target aarch64-apple-tvos \
            --release \
            --lib \
            --crate-type staticlib

          TVOS_DEPLOYMENT_TARGET=16.0 cargo +nightly rustc -Z build-std \
            --manifest-path Cargo.toml \
            --package smbcloud-auth-sdk-apple \
            --target aarch64-apple-tvos-sim \
            --release \
            --lib \
            --crate-type staticlib

          XROS_DEPLOYMENT_TARGET=1.0 cargo +nightly rustc -Z build-std \
            --manifest-path Cargo.toml \
            --package smbcloud-auth-sdk-apple \
            --target aarch64-apple-visionos \
            --release \
            --lib \
            --crate-type staticlib

          XROS_DEPLOYMENT_TARGET=1.0 cargo +nightly rustc -Z build-std \
            --manifest-path Cargo.toml \
            --package smbcloud-auth-sdk-apple \
            --target aarch64-apple-visionos-sim \
            --release \
            --lib \
            --crate-type staticlib

      - name: Generate Swift bindings and assemble XCFramework
        id: package
        shell: bash
        run: |
          set -euo pipefail

          build_root="${RUNNER_TEMP}/sdk-apple-build"
          generated_dir="${build_root}/generated"
          headers_dir="${build_root}/Headers"
          frameworks_dir="${build_root}/frameworks"
          output_dir="${GITHUB_WORKSPACE}/dist/sdk-apple"
          output_xcframework="${output_dir}/${XCFRAMEWORK_NAME}"
          bindgen_bin="${GITHUB_WORKSPACE}/target/release/uniffi-bindgen"

          rm -rf "${build_root}" "${output_dir}"
          mkdir -p "${generated_dir}" "${headers_dir}" "${frameworks_dir}" "${output_dir}"

          "${bindgen_bin}" generate \
            --library "${GITHUB_WORKSPACE}/target/aarch64-apple-ios/release/${STATIC_LIB_NAME}" \
            --language swift \
            --out-dir "${generated_dir}"

          cp "${generated_dir}/smbcloud_auth.swift" "${output_dir}/smbcloud_auth.swift"
          cp "${generated_dir}/smbcloud_authFFI.h" "${headers_dir}/smbcloud_authFFI.h"
          cp "${generated_dir}/smbcloud_authFFI.h" "${output_dir}/smbcloud_authFFI.h"

          stage_framework() {
            local lib_input="$1"
            local framework_output="$2"

            rm -rf "${framework_output}"
            mkdir -p "${framework_output}/Headers" "${framework_output}/Modules"

            cp "${lib_input}" "${framework_output}/smbcloud_authFFI"
            cp "${headers_dir}/smbcloud_authFFI.h" "${framework_output}/Headers/smbcloud_authFFI.h"

            printf '%s\n' \
              'framework module smbcloud_authFFI {' \
              '    header "smbcloud_authFFI.h"' \
              '    export *' \
              '    use "Darwin"' \
              '    use "_Builtin_stdbool"' \
              '    use "_Builtin_stdint"' \
              '}' \
              > "${framework_output}/Modules/module.modulemap"

            printf '%s\n' \
              '<?xml version="1.0" encoding="UTF-8"?>' \
              '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "https://www.apple.com/DTDs/PropertyList-1.0.dtd">' \
              '<plist version="1.0">' \
              '<dict>' \
              '  <key>CFBundleIdentifier</key>' \
              '  <string>xyz.smbcloud.smbcloud-auth-ffi</string>' \
              '  <key>CFBundleName</key>' \
              '  <string>smbcloud_authFFI</string>' \
              '  <key>CFBundleExecutable</key>' \
              '  <string>smbcloud_authFFI</string>' \
              '  <key>CFBundlePackageType</key>' \
              '  <string>FMWK</string>' \
              '  <key>CFBundleShortVersionString</key>' \
              '  <string>dev</string>' \
              '  <key>CFBundleVersion</key>' \
              '  <string>1</string>' \
              '</dict>' \
              '</plist>' \
              > "${framework_output}/Info.plist"
          }

          stage_framework \
            "${GITHUB_WORKSPACE}/target/aarch64-apple-ios/release/${STATIC_LIB_NAME}" \
            "${frameworks_dir}/ios/smbcloud_authFFI.framework"
          stage_framework \
            "${GITHUB_WORKSPACE}/target/aarch64-apple-ios-sim/release/${STATIC_LIB_NAME}" \
            "${frameworks_dir}/ios-sim/smbcloud_authFFI.framework"
          stage_framework \
            "${GITHUB_WORKSPACE}/target/aarch64-apple-darwin/release/${STATIC_LIB_NAME}" \
            "${frameworks_dir}/macos/smbcloud_authFFI.framework"
          stage_framework \
            "${GITHUB_WORKSPACE}/target/aarch64-apple-tvos/release/${STATIC_LIB_NAME}" \
            "${frameworks_dir}/tvos/smbcloud_authFFI.framework"
          stage_framework \
            "${GITHUB_WORKSPACE}/target/aarch64-apple-tvos-sim/release/${STATIC_LIB_NAME}" \
            "${frameworks_dir}/tvos-sim/smbcloud_authFFI.framework"
          stage_framework \
            "${GITHUB_WORKSPACE}/target/aarch64-apple-visionos/release/${STATIC_LIB_NAME}" \
            "${frameworks_dir}/visionos/smbcloud_authFFI.framework"
          stage_framework \
            "${GITHUB_WORKSPACE}/target/aarch64-apple-visionos-sim/release/${STATIC_LIB_NAME}" \
            "${frameworks_dir}/visionos-sim/smbcloud_authFFI.framework"

          xcodebuild -create-xcframework \
            -framework "${frameworks_dir}/ios/smbcloud_authFFI.framework" \
            -framework "${frameworks_dir}/ios-sim/smbcloud_authFFI.framework" \
            -framework "${frameworks_dir}/macos/smbcloud_authFFI.framework" \
            -framework "${frameworks_dir}/tvos/smbcloud_authFFI.framework" \
            -framework "${frameworks_dir}/tvos-sim/smbcloud_authFFI.framework" \
            -framework "${frameworks_dir}/visionos/smbcloud_authFFI.framework" \
            -framework "${frameworks_dir}/visionos-sim/smbcloud_authFFI.framework" \
            -output "${output_xcframework}"

          ditto -c -k --sequesterRsrc --keepParent \
            "${output_xcframework}" \
            "${output_dir}/${XCFRAMEWORK_NAME}.zip"

          echo "artifact_dir=${output_dir}" >> "$GITHUB_OUTPUT"

      - name: Upload Apple bridge artifacts
        uses: actions/upload-artifact@v7
        with:
          name: sdk-apple-artifacts
          path: ${{ steps.package.outputs.artifact_dir }}

      - name: Publish summary
        shell: bash
        run: |
          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ## Apple bridge SDK verification

          Verified crate: `smbcloud-auth-sdk-apple`

          Generated artifacts:
          - UniFFI Swift bindings
          - smbcloud_authFFI XCFramework
          - zipped XCFramework artifact
          EOF
